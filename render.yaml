services:
  # Бэкенд сервер
  - type: web
    name: crystal-collector-backend
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate
    startCommand: node server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: crystal-collector-db
          property: connectionString
      - key: PORT
        value: 3000

  # Фронтенд статика
  - type: web
    name: crystal-collector-frontend
    runtime: static
    plan: starter
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://crystal-collector-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: crystal-collector-db
    plan: starter
    databaseName: crystal_collector
