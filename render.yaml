services:
  # Бэкенд сервер
  - type: web
    name: crystal-collector-backend
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate
    startCommand: node server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: crystal-collector-db
          property: connectionString
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_uedcyt7KOgU5@ep-hidden-dream-aszl8sh5-pooler.c-4.eu-central-1.aws.neon.tech/neondb?sslmode=require

  # Фронтенд статика
  - type: web
    name: crystal-collector-frontend
    runtime: static
    plan: starter
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://crystal-collector-backend.onrender.com

databases:
  - name: crystal-collector-db
    plan: starter
    databaseName: crystal_collector
    user: crystal_user
    ipAllowList: []  # Разрешить подключения только из Render
